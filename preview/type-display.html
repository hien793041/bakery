<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { padding: 24px; background: var(--bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 32px; align-items: baseline; }
  .row { display: flex; align-items: baseline; gap: 16px; justify-content: space-between; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
</style>
</head>
<body>
<div class="grid">
  <div class="row"><span style="font-family: var(--font-serif); font-style:italic; font-weight:400; font-size: 64px; line-height:1; color: var(--fg);">Mira</span><span class="spec">Serif · 64 · ital</span></div>
  <div class="row"><span style="font-family: var(--font-serif); font-style:italic; font-weight:500; font-size: 40px; line-height:1; color: var(--fg);">fresh today</span><span class="spec">Serif · 40 · ital 500</span></div>
  <div class="row"><span style="font-family: var(--font-serif); font-weight:500; font-size: 28px; line-height:1; color: var(--fg);">Strawberry Mousse Cake</span><span class="spec">Serif · 28 · 500</span></div>
  <div class="row"><span style="font-family: var(--font-script); font-weight:500; font-size: 36px; line-height:1; color: var(--accent);">sweet things</span><span class="spec">Script · 36</span></div>
</div>
</body>
</html>
