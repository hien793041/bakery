<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { padding: 24px; background: var(--bg); }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { flex: 1; border-radius: var(--r-md); padding: 14px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-sans); border: 1px solid var(--hairline); }
  .name { font-weight: 600; font-size: 13px; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: .7; }
  .label { font-size: 11px; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: .12em; color: var(--fg-muted); margin-bottom: 4px;}
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="label">Cream paper · 70% of surface</div>
    <div class="row">
      <div class="swatch" style="background:#FEFBF5; color:#2B1E1A"><span class="name">cream-50</span><span class="hex">#FEFBF5</span></div>
      <div class="swatch" style="background:#FBF5EC; color:#2B1E1A"><span class="name">cream-100 · page bg</span><span class="hex">#FBF5EC</span></div>
      <div class="swatch" style="background:#F5ECD9; color:#2B1E1A"><span class="name">cream-200</span><span class="hex">#F5ECD9</span></div>
      <div class="swatch" style="background:#EBDEC3; color:#2B1E1A"><span class="name">cream-300</span><span class="hex">#EBDEC3</span></div>
    </div>
  </div>
</div>
</body>
</html>
