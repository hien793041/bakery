<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { padding: 28px; background: var(--bg); font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; gap: 32px; }
  .lockup { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  img { display: block; }
  .caption { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>
<body>
<div class="lockup">
  <img src="../assets/logo/wordmark.svg" height="90" alt="Mira Bánh Ngọt"/>
  <div class="caption">wordmark · on cream</div>
</div>
<div class="lockup">
  <img src="../assets/logo/monogram.svg" height="90" alt="M"/>
  <div class="caption">monogram · on pink disc</div>
</div>
</body>
</html>
