<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { padding: 28px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    border-radius: var(--r-md); padding: 12px 22px; border: 1px solid transparent;
    cursor: pointer; transition: all .18s var(--ease);
  }
  .primary { background: var(--terra-500); color: var(--cream-50); box-shadow: var(--shadow-sm); }
  .primary:hover { background: var(--terra-600); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .secondary { background: var(--cream-50); color: var(--fg); border-color: var(--hairline); }
  .secondary:hover { background: var(--pink-100); }
  .ghost { background: transparent; color: var(--terra-500); }
  .ghost:hover { background: var(--pink-100); }
  .round { width: 44px; height: 44px; border-radius: 999px; padding: 0; display: inline-flex; align-items: center; justify-content: center; background: var(--terra-500); color: var(--cream-50); font-size: 20px; font-weight: 400; border: none; box-shadow: var(--shadow-md); }
  .label { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; display:block; }
</style>
</head>
<body>
<div>
  <span class="label">Buttons</span>
  <div class="row">
    <button class="btn primary">Add to bag</button>
    <button class="btn secondary">View details</button>
    <button class="btn ghost">Skip</button>
    <button class="round">+</button>
  </div>
</div>
</body>
</html>
