<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .box { background: var(--terra-500); border-radius: 4px; }
  .stop { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .name { font-size: 11px; font-weight: 600; color: var(--fg); }
</style>
</head>
<body>
<div class="row">
  <div class="stop"><div class="box" style="width:4px; height:4px"></div><div class="name">sp-1</div><div class="label">4</div></div>
  <div class="stop"><div class="box" style="width:8px; height:8px"></div><div class="name">sp-2</div><div class="label">8</div></div>
  <div class="stop"><div class="box" style="width:12px; height:12px"></div><div class="name">sp-3</div><div class="label">12</div></div>
  <div class="stop"><div class="box" style="width:16px; height:16px"></div><div class="name">sp-4</div><div class="label">16</div></div>
  <div class="stop"><div class="box" style="width:24px; height:24px"></div><div class="name">sp-5</div><div class="label">24</div></div>
  <div class="stop"><div class="box" style="width:32px; height:32px"></div><div class="name">sp-6</div><div class="label">32</div></div>
  <div class="stop"><div class="box" style="width:48px; height:48px"></div><div class="name">sp-7</div><div class="label">48</div></div>
  <div class="stop"><div class="box" style="width:64px; height:64px"></div><div class="name">sp-8</div><div class="label">64</div></div>
  <div class="stop"><div class="box" style="width:96px; height:96px"></div><div class="name">sp-9</div><div class="label">96</div></div>
</div>
</body>
</html>
