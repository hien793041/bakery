<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { padding: 24px; background: var(--bg); }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 8px 20px; align-items: baseline; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .06em; }
</style>
</head>
<body>
<div class="row">
  <div style="font-family: var(--font-serif); font-style:italic; font-weight:400; font-size: 72px; line-height:1; color: var(--fg);">sweetness</div><span class="spec">display / 72</span>
  <div style="font-family: var(--font-serif); font-weight:500; font-size: 36px; color: var(--fg);">Fresh Pastries</div><span class="spec">h1 / 36</span>
  <div style="font-family: var(--font-serif); font-weight:500; font-size: 28px; color: var(--fg);">Macaron Collection</div><span class="spec">h2 / 28</span>
  <div style="font-family: var(--font-serif); font-weight:600; font-size: 22px; color: var(--fg);">Product Details</div><span class="spec">h3 / 22</span>
</div>
</body>
</html>
