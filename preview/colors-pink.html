<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { padding: 24px; background: var(--bg); }
  .row { display: flex; gap: 12px; }
  .swatch { flex: 1; border-radius: var(--r-md); padding: 14px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-sans); border: 1px solid var(--hairline); }
  .name { font-weight: 600; font-size: 13px; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: .75; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--fg-muted); margin-bottom: 4px; font-family: var(--font-sans); }
</style>
</head>
<body>
<div>
  <div class="label">Pastel pink · 20% of surface</div>
  <div class="row">
    <div class="swatch" style="background:#FEF5F5; color:#2B1E1A"><span class="name">pink-50</span><span class="hex">#FEF5F5</span></div>
    <div class="swatch" style="background:#FDECEC; color:#2B1E1A"><span class="name">pink-100</span><span class="hex">#FDECEC</span></div>
    <div class="swatch" style="background:#F9DCDC; color:#2B1E1A"><span class="name">pink-200 · pill bg</span><span class="hex">#F9DCDC</span></div>
    <div class="swatch" style="background:#F4C2C2; color:#2B1E1A"><span class="name">pink-300 · hero disc</span><span class="hex">#F4C2C2</span></div>
    <div class="swatch" style="background:#EC9E9E; color:#2B1E1A"><span class="name">pink-400</span><span class="hex">#EC9E9E</span></div>
    <div class="swatch" style="background:#DD7A7A; color:#fff"><span class="name">pink-500</span><span class="hex">#DD7A7A</span></div>
  </div>
</div>
</body>
</html>
