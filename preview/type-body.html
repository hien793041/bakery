<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr auto; gap: 10px 24px; align-items: baseline; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
</style>
</head>
<body>
<div class="grid">
  <div style="font-size: 22px; font-weight: 600; color: var(--fg);">Baked fresh every morning</div><span class="spec">lg · 22 · 600</span>
  <div style="font-size: 18px; font-weight: 500; color: var(--fg);">Add to your bag</div><span class="spec">md · 18 · 500</span>
  <div style="font-size: 16px; font-weight: 400; color: var(--fg);">Strawberry mousse cake layered with whipped cream, made with French butter and Da Lat strawberries.</div><span class="spec">base · 16 · 400</span>
  <div style="font-size: 14px; font-weight: 500; color: var(--fg-muted);">Open 7am — 9pm daily</div><span class="spec">sm · 14 · 500</span>
  <div style="font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .12em;">FRESH TODAY</div><span class="spec">xs · 12 · caps</span>
</div>
</body>
</html>
