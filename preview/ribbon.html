<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { padding: 0; background: var(--bg); font-family: var(--font-sans); margin:0; }
  .ribbon { background: var(--terra-500); color: var(--cream-50); padding: 14px 0; overflow: hidden; white-space: nowrap; font-size: 14px; font-weight: 500; letter-spacing: .02em; }
  .track { display: inline-block; animation: scroll 40s linear infinite; padding-right: 48px; }
  .track span { margin: 0 18px; }
  .dot { opacity: .6; }
  @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  body { padding-top: 40px; }
</style>
</head>
<body>
<div class="ribbon">
  <div class="track">
    <span>No preservatives</span><span class="dot">·</span>
    <span>Local Bay Area delivery</span><span class="dot">·</span>
    <span>Handmade every morning</span><span class="dot">·</span>
    <span>Imported French butter</span><span class="dot">·</span>
    <span>Free gift wrapping</span><span class="dot">·</span>
    <span>No preservatives</span><span class="dot">·</span>
    <span>Local Bay Area delivery</span><span class="dot">·</span>
    <span>Handmade every morning</span><span class="dot">·</span>
    <span>Imported French butter</span><span class="dot">·</span>
    <span>Free gift wrapping</span><span class="dot">·</span>
  </div>
</div>
</body>
</html>
