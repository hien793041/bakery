<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { padding: 20px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .illus { width: 110px; height: 110px; }
  .caption { font-family: var(--font-serif); font-size: 15px; font-style: italic; color: var(--fg); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><img class="illus" src="../assets/illustrations/croissant.svg" alt=""/><div class="caption">Croissant</div></div>
  <div class="item"><img class="illus" src="../assets/illustrations/macaron.svg" alt=""/><div class="caption">Macaron</div></div>
  <div class="item"><img class="illus" src="../assets/illustrations/tart.svg" alt=""/><div class="caption">Tart</div></div>
  <div class="item"><img class="illus" src="../assets/illustrations/cupcake.svg" alt=""/><div class="caption">Cupcake</div></div>
  <div class="item"><img class="illus" src="../assets/illustrations/tiramisu.svg" alt=""/><div class="caption">Tiramisu</div></div>
</div>
</body>
</html>
